<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' blob:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://ajax.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://ajax.googleapis.com;"
    />
    <title>クビを回避せよ！！～病院受付シミュレーション～</title>

    <!-- favicon 404エラー対策 -->
    <link rel="icon" href="data:," />

    <!-- Google Fonts (Electronでもオンライン読み込み、オフライン時はシステムフォントにフォールバック) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- WebFont Loader (CDN) -->
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>

    <!-- Phaser (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family:
          "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo,
          sans-serif;
        overflow: hidden;
      }

      #game-container {
        position: relative;
      }

      canvas {
        border: 1px solid #fff;
        max-width: 100vw;
        max-height: 100vh;
      }

      /* タイピングシーン用HTML入力フィールド */
      .typing-html-input {
        position: absolute;
        font-family:
          "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo,
          sans-serif;
        font-size: 20px;
        padding: 8px 12px;
        border: 2px solid #3498db;
        border-radius: 6px;
        background-color: rgba(255, 255, 255, 0.98);
        color: #333;
        outline: none;
        z-index: 1000;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        ime-mode: active;
      }

      .typing-html-input:focus {
        border-color: #27ae60;
        box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.3);
      }

      .typing-html-input::placeholder {
        color: #aaa;
      }
    </style>
  </head>

  <body>
    <div id="game-container"></div>
    <script type="module" src="./GameConfig.js"></script>
  </body>
</html>
